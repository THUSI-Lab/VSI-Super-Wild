# VSI-Super-Wild unified QA task
task: vsi_super_wild
description: "VSI-Super-Wild unified QA benchmark"
dataset_path: json
dataset_name: null
dataset_kwargs:
  data_files:
    test: tasks/vsi_super_wild/data/vsi_super_wild_qa.jsonl
test_split: test
doc_to_text: !function utils.doc_to_text
doc_to_visual: !function utils.doc_to_visual
doc_to_target: "answer"
process_results: !function utils.process_results
output_type: generate_until
fewshot_split: null
fewshot_config: null
num_fewshot: 0
metric_list:
  - metric: vmr_accuracy
    aggregation: !function utils.aggregate_accuracy
    higher_is_better: true
  - metric: vpo_accuracy
    aggregation: !function utils.aggregate_accuracy
    higher_is_better: true
  - metric: voo_accuracy
    aggregation: !function utils.aggregate_accuracy
    higher_is_better: true
  - metric: voc_mra
    aggregation: !function utils.aggregate_mra
    higher_is_better: true
  - metric: overall
    aggregation: !function utils.aggregate_overall
    higher_is_better: true
generation_kwargs:
  max_new_tokens: 256
  temperature: 0.0
  top_p: 1.0
  num_beams: 1
  do_sample: false
metadata:
  version: 1.0
  source: VSI-Super-Wild
